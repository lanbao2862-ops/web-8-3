<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bó hoa chúc mừng 8/3</title>

<style>
body{
margin:0;
height:100vh;
background:radial-gradient(circle at center,#ff4da6,#7b1fa2,#1a0033);
font-family:Arial;
overflow:hidden;
}

/* hoa bay */
.hoa{
position:absolute;
width:70px;
animation:baylen 10s linear infinite;
}

.h1{left:5%; bottom:-80px; animation-delay:0s;}
.h2{left:12%; bottom:-80px; animation-delay:2s;}
.h3{left:20%; bottom:-80px; animation-delay:4s;}
.h4{left:28%; bottom:-80px; animation-delay:1s;}
.h5{left:36%; bottom:-80px; animation-delay:3s;}
.h6{left:44%; bottom:-80px; animation-delay:5s;}
.h7{left:52%; bottom:-80px; animation-delay:2.5s;}
.h8{left:60%; bottom:-80px; animation-delay:4.5s;}
.h9{left:68%; bottom:-80px; animation-delay:1.5s;}
.h10{left:76%; bottom:-80px; animation-delay:3.5s;}
.h11{left:84%; bottom:-80px; animation-delay:6s;}
.h12{left:92%; bottom:-80px; animation-delay:2.2s;}

@keyframes baylen{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

/* chữ */
.text{
position:absolute;
top:45%;
width:100%;
text-align:center;
font-size:40px;
color:white;
font-weight:bold;
cursor:pointer;
text-shadow:0 0 10px #fff,0 0 20px #ff4da6;
}

/* pháo hoa */
.firework{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:no 2s ease-out infinite;
}

.f1{top:20%; left:20%; animation-delay:0s;}
.f2{top:30%; left:70%; animation-delay:1s;}
.f3{top:60%; left:40%; animation-delay:0.5s;}
.f4{top:50%; left:80%; animation-delay:1.5s;}
.f5{top:25%; left:50%; animation-delay:2s;}

@keyframes no{
0%{transform:scale(0);opacity:1;}
70%{transform:scale(8);opacity:0.8;}
100%{transform:scale(12);opacity:0;}
}
</style>
</head>

<body>

<img src="images/hoa1.png" class="hoa h1">
<img src="images/hoa2.png" class="hoa h2">
<img src="images/hoa3.png" class="hoa h3">
<img src="images/hoa4.png" class="hoa h4">
<img src="images/hoa5.png" class="hoa h5">
<img src="images/hoa6.png" class="hoa h6">
<img src="images/hoa7.png" class="hoa h7">
<img src="images/hoa8.png" class="hoa h8">
<img src="images/hoa9.png" class="hoa h9">
<img src="images/hoa10.png" class="hoa h10">
<img src="images/hoa11.png" class="hoa h11">
<img src="images/hoa12.png" class="hoa h12">

<div class="firework f1"></div>
<div class="firework f2"></div>
<div class="firework f3"></div>
<div class="firework f4"></div>
<div class="firework f5"></div>

<div class="text" onclick="doiLoiChuc()" id="loichuc">
Nhấn vào đây 🌸
</div>

<script>
let loiChuc = [
"Chúc Mừng 8/3 🌸",
"Chúc bé luôn xinh đẹp ✨",
"Luôn vui vẻ và hạnh phúc 💖",
"Thành công trong mọi việc 🌷",
"Mãi luôn rạng rỡ như hoa 🌹"
];

let i = 0;

function doiLoiChuc(){
i++;
if(i >= loiChuc.length){
i = 0;
}
document.getElementById("loichuc").innerText = loiChuc[i];
}
</script>

</body>
</html>
